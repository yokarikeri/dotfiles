# ================================
#  Keybindings
# ================================

# Change prefix key from C-b
set -g prefix M-f
unbind C-b
bind M-f send-prefix

# Fix Home / End keys not working
# ref. https://stackoverflow.com/a/55616731
bind -n Home send Escape "OH"
bind -n End send Escape "OF"

# Open a popup window
#bind P display-popup -E -d '#{pane_current_path}' -w 100% -h 100% "$HOME/.local/bin/tmux-popup.sh"

# Close a popup window
bind P detach-client

# Disable right-click in pane (does not apply to status line)
unbind -n MouseDown3Pane


# ================================
#  Copy Mode
# ================================

# Use vi keybindings in copy mode and status line
setw -g mode-keys vi
setw -g status-keys vi

# Copy buffer to system clipboard (for tmux 3.2+)
if-shell 'which xsel' 'set -s copy-command "xsel -bi"'
if-shell 'which pbcopy' 'set -s copy-command "pbcopy"'


# ================================
#  Basic Settings
# ================================

# Set default terminal for 256-color support
set -g default-terminal "tmux-256color"

# Enable 24-bit true color support
set -ga terminal-overrides ",xterm-256color:RGB"

# Reduce escape key delay time (ms)
set -s escape-time 10

# Set default shell
set -g default-shell /bin/zsh

# Enable mouse support
set -g mouse on

# Increase scrollback history limit
set -g history-limit 30000


# ================================
#  Status Line
# ================================

# Format variables (ref. https://man.openbsd.org/tmux.1#FORMATS)
# - `#H`: `host`
# - `#h`: `host_short`
# - `#D`: `pane_id`
# - `#P`: `pane_index`
# - `#T`: `pane_title`
# - `#S`: `session_name`
# - `#F`: `window_flags`
# - `#I`: `window_index`
# - `#W`: `window_name`

# Set status line update interval (seconds)
set -g status-interval 5

# Automatically rename window based on current program (default: on)
setw -g automatic-rename off

# Prevent programs from changing the window name (#W)
setw -g allow-rename off

# Define format for automatic window renaming (#W)
# - Use '~' for home directory, or the first 15 characters of current directory basename
setw -g automatic-rename-format '#{?#{==:#{pane_current_path},#{HOME}},~,#{=15:#{b:pane_current_path}}}'

# Prevent programs from changing the pane title (#T) (for tmux 3.5+)
set -g allow-set-title off

# Set status bar colors
# - 236 #303030 / gray background
# - white 015 #ffffff / white text
set -g status-style bg=colour236,fg=white

# Set max length of left status bar (default: 10)
set -g status-left-length 30

# Set max length of right status bar (default: 40)
# set -g status-left-length 40

# Left status: session name and pane title
# - 024 #005f87 / 255 #eeeeee / session name (#S)
# - 054 #5f0087 / 255 #eeeeee / pane title (#T) (max 21 chars)
set -g status-left '\
#[bg=colour024,fg=colour255] #S \
#[bg=colour054,fg=colour255] #{=21:pane_title} '

# Right status: system clock (format: YYYY-MM-DD(Day) HH:MM)
set -g status-right '\
#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,} \
%Y-%m-%d(%a) %H:%M'

# Window status: style for active and inactive windows
# - Active window
#   - 239 #4e4e4e / bold, background
#   - 119 #87ff5f / window index (#I)
#   - 249 #b2b2b2 / ':'
#   - 255 #eeeeee / window name (#W)
#   - 249 #b2b2b2 / window flags (#F)
# - Inactive window
#   - ãƒ‡ãƒ•ã‚©ãƒ«ãƒˆ
#   - 244 #808080 / window index (#I)
#   - 237 #3a3a3a / ':'
#   - 250 #bcbcbc / window name (#W)
#   - 244 #808080 / window flags (#F)
setw -g window-status-separator ''
setw -g window-status-current-style bg=colour239,bold
setw -g window-status-current-format ' \
#[fg=colour119]#I\
#[fg=colour249]:\
#[fg=colour255]#W\
#[fg=colour249]#F\
 '
setw -g window-status-style bg=default
setw -g window-status-format ' \
#[fg=colour244]#I\
#[fg=colour237]:\
#[fg=colour250]#W\
#[fg=colour244]#F\
 '

# ================================
#  Panes
# ================================

# Pane border styles
## 238 #444444 / (dark gray for normal
## 255 #eeeeee / light gray for active
setw -g pane-border-style        bg=default,fg=colour238
setw -g pane-active-border-style bg=default,fg=colour255
