# ~/.config/starship.toml

# Tip: To check the default value, run the following command:
# curl -s https://starship.rs/config-schema.json | jq -r '"property_name \t| default_key \t| default_value", (.properties | to_entries[] | select(.value.default | type == "object") | .key as $pname | .value.default | to_entries[] | "\($pname) \t| \(.key) \t| \(.value | tojson)")' | column -t -s $'\t'
"$schema" = 'https://starship.rs/config-schema.json'

# ================================
#  p10k_classic_like
# ================================

format = """
[Óā∂](fg:p10k_bg)[$os ](bold bg:p10k_bg fg:white)\
([ÓāĶ](bg:p10k_bg fg:p10k_grey_dark)[ $directory ](bg:p10k_bg fg:p10k_vivid_blue))\
([ÓāĶ](bg:p10k_bg fg:p10k_grey_dark)[ Óģ™ ${env_var.AWS_PROFILE} ](bg:p10k_bg fg:p10k_grey_light))\
([ÓāĶ](bg:p10k_bg fg:p10k_grey_dark)[ $time ](bg:p10k_bg fg:p10k_grey_mid))\
[Óāī](fg:p10k_bg)\
([ $status](fg:p10k_red))\
([ $cmd_duration](fg:p10k_grey_dark))\
$fill\
([ÔäĹ $username ](fg:p10k_grey_dark))\
([$hostname ](fg:p10k_grey_dark))\
([Óā∂](fg:p10k_bg)[ $git_branch( $git_state )$git_status ](bg:p10k_bg fg:p10k_grey_light)[Óāī](fg:p10k_bg))\
$line_break\
[$character](fg:p10k_vivid_green)"""

palette = 'p10k_classic_like'

# ================================
#  Color Palettes
# ================================

[palettes.p10k_classic_like]
p10k_bg = '238' # #444444
p10k_vivid_blue = '39' # #00afff
p10k_vivid_green = '76' # #5fd700
p10k_vivid_red = '196' # #ff0000
p10k_red = '203' # #ff5f5f # '160' # #d70000
p10k_orange = '208' # #ff8700
p10k_yellow = '178' # #dfaf00
p10k_green = '70' # #5faf00
p10k_dark_green = '28' # #008700
p10k_cyan = '37' # #00afaf
p10k_blue = '32' # #0087d7
p10k_purple = '99' # #875fff
p10k_pink = '168' # #d75f87
p10k_turquoise = '66' # #5f8787
p10k_grey_dark = '243' # #767676
p10k_grey_mid = '248' # #a8a8a8
p10k_grey_light = '253' # #dadada

# ================================
#  env_var Module
# ================================

[env_var.AWS_PROFILE]
format = '$env_value'

